name: clone-and-docker-build
description: Clone a repository and build a Docker image

inputs:
  repository_url:
    description: Repository URL to clone
    required: true
  docker_context:
    description: Docker build context path
    required: true
  dockerfile:
    description: Dockerfile path
    required: true
  docker_namespace:
    description: Container registry namespace or project
    required: true
  docker_reponame:
    description: Container image repository name
    required: true
  docker_tag:
    description: Container image tag
    required: true
  docker_registry:
    description: Container registry URL
    required: true
  docker_username:
    description: Container registry username
    required: true
  docker_password:
    description: Container registry password
    required: true

runs:
  using: composite
  steps:
    - name: Clone target repository
      shell: bash
      run: git clone "${{ inputs.repository_url }}"

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to container registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.docker_registry }}
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.dockerfile }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ inputs.docker_registry }}/${{ inputs.docker_namespace }}/${{ inputs.docker_reponame }}:${{ inputs.docker_tag }}
