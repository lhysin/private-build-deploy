name: clone-and-docker-build
description: Clone a repository (public or private) and build a Docker image

inputs:
  repository_url:
    description: Repository URL to clone
    required: true
  repository_token:
    description: Optional token for cloning a private repository. Falls back to GITHUB_TOKEN when empty.
    required: false
    default: ""
  docker_context:
    description: Docker build context path
    required: true
  dockerfile:
    description: Dockerfile path
    required: true
  image_tag:
    description: Docker image tag to push
    required: true
  docker_registry:
    description: Container registry URL
    required: false
  docker_username:
    description: Container registry username
    required: true
  docker_password:
    description: Container registry password
    required: true

runs:
  using: composite
  steps:
    - name: Clone target repository
      shell: bash
      env:
        REPO_URL: ${{ inputs.repository_url }}
        REPO_TOKEN: ${{ inputs.repository_token }}
        GH_TOKEN: ${{ github.token }}
      run: |
        # Pick the first non-empty token: explicit input > GITHUB_TOKEN
        TOKEN=""
        if [ -n "$REPO_TOKEN" ]; then
          TOKEN="$REPO_TOKEN"
        elif [ -n "$GH_TOKEN" ]; then
          TOKEN="x-access-token:${GH_TOKEN}"
        fi

        if [ -n "$TOKEN" ]; then
          # Inject token into https URL: https://<token>@github.com/owner/repo.git
          AUTHED_URL=$(echo "$REPO_URL" | sed -E "s#https://#https://${TOKEN}@#")
          git clone "$AUTHED_URL"
        else
          # Public repository
          git clone "$REPO_URL"
        fi

    - name: Set up QEMU
      uses: docker/setup-qemu-action@v4

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v4

    - name: Login to container registry
      uses: docker/login-action@v4
      with:
        registry: ${{ inputs.docker_registry }}
        username: ${{ inputs.docker_username }}
        password: ${{ inputs.docker_password }}

    - name: Build and push Docker image
      uses: docker/build-push-action@v7
      with:
        context: ${{ inputs.docker_context }}
        file: ${{ inputs.dockerfile }}
        platforms: linux/amd64,linux/arm64
        push: true
        tags: ${{ inputs.image_tag }}
