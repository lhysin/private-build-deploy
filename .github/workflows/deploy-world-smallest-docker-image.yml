name: deploy-world-smallest-docker-image

on:
  workflow_dispatch:

permissions:
  contents: read

env:
  DOCKER_NAMESPACE: lhysin
  DOCKER_REPONAME: world-smallest-docker-image
  DOCKER_TAG: latest

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout workflow repository
        uses: actions/checkout@v6

      - name: Clone and build Docker image
        uses: ./.github/actions/clone-and-docker-build
        with:
          repository_url: https://github.com/dooqod/world-smallest-docker-image.git
          docker_context: ./world-smallest-docker-image
          dockerfile: ./world-smallest-docker-image/Dockerfile
          image_tag: ${{ env.DOCKER_NAMESPACE }}/${{ env.DOCKER_REPONAME }}:${{ env.DOCKER_TAG }}
          docker_registry: ${{ secrets.DOCKER_REGISTRY }}
          docker_username: ${{ secrets.DOCKER_USERNAME }}
          docker_password: ${{ secrets.DOCKER_PASSWORD }}
